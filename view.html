<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Newsletter Archive</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <header class="viewer-header">
    <div class="container container--wide viewer-header__inner">
      <div class="viewer-nav">
        <a href="index.html" class="viewer-nav__btn" id="back-link" title="Back to list">&#8592;</a>
        <a href="#" class="viewer-nav__btn" id="prev-btn" title="Previous email" aria-disabled="true">&#8593;</a>
        <a href="#" class="viewer-nav__btn" id="next-btn" title="Next email" aria-disabled="true">&#8595;</a>
      </div>
      <div class="viewer-meta">
        <div class="viewer-meta__subject" id="viewer-subject">Loading...</div>
        <div class="viewer-meta__date" id="viewer-date"></div>
      </div>
      <div class="viewer-nav viewer-nav--right">
        <button class="viewer-nav__btn" id="read-btn" title="Mark as unread"></button>
        <button class="viewer-nav__btn" id="bookmark-btn" title="Bookmark">
          <svg width="16" height="16" viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"><path d="M3.5 2.5h9v12L8 11l-4.5 3.5v-12z"/></svg>
        </button>
      </div>
    </div>
  </header>

  <iframe class="viewer-frame" id="email-frame" sandbox="allow-same-origin" title="Email content"></iframe>

  <script src="app.js"></script>
  <script>
    App.initViewer();
  </script>
</body>
</html>
