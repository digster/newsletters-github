<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Newsletter Archive</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <header class="header">
    <div class="container container--wide header__inner">
      <div class="header__title">
        <a href="index.html">Newsletter Archive</a>
      </div>
      <div class="header__right">
        <a href="random.html" class="header__random" title="Random email">
          <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polyline points="16 3 21 3 21 8"/><line x1="4" y1="20" x2="21" y2="3"/><polyline points="21 16 21 21 16 21"/><line x1="15" y1="15" x2="21" y2="21"/><line x1="4" y1="4" x2="9" y2="9"/></svg>
          Random
        </a>
        <a href="bookmarks.html" class="header__bookmarks" title="Bookmarks">
          <svg width="14" height="14" viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"><path d="M3.5 2.5h9v12L8 11l-4.5 3.5v-12z"/></svg>
          Bookmarks
          <span class="header__badge" id="bookmarks-badge" style="display:none"></span>
        </a>
        <span class="header__stats" id="stats"></span>
      </div>
    </div>
  </header>

  <main class="container container--wide">
    <div class="search-wrap">
      <input
        type="text"
        class="search-input"
        id="search"
        placeholder="Search newsletters... (press / to focus)"
        autocomplete="off"
        spellcheck="false"
      >
    </div>

    <div class="grid" id="newsletter-grid">
      <div class="loading">Loading...</div>
    </div>
  </main>

  <script src="app.js"></script>
  <script>
    App.initHomepage();
    App.initKeyboard();
  </script>
</body>
</html>
